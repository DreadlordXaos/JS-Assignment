<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipping Numbers</title>
</head>
<body>
    <script>
    let N = parseInt(prompt("Enter N:"));
    let seed = parseInt(prompt("Enter seed:"));

    let m = 0;
    let sum = 0;
    let skip = seed + 2;

    while (sum < N) {
        m++;
        if (m % skip !== 0) {
            sum += m;
        }
    }

    alert(m + " " + sum);
    </script>
</body>
</html>
